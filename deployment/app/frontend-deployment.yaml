apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: more-cars-frontend
          #image: docker.io/dennisgerike/more-cars-frontend:latest
          image: ghcr.io/more-cars/frontend:latest
          env:
            - name: ANALYTICS_URL
              value: https://analytics.default.more-cars.net
            - name: API_URL
              value: http:$(API_SERVICE_HOST):$(API_SERVICE_PORT)
            - name: BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  optional: true
                  name: basic-auth
                  key: username
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  optional: true
                  name: basic-auth
                  key: password
            - name: API_BASIC_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  optional: true
                  name: basic-auth
                  key: username
            - name: API_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  optional: true
                  name: basic-auth
                  key: password
          resources:
            requests:
              cpu: "30m"
              memory: "150Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
