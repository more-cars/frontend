apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-public-http
spec:
  parentRefs:
    - name: more-cars-gateway
      sectionName: more-cars-public-http

  hostnames:
    - more-cars.net

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
