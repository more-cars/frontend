on:
  workflow_call:

jobs:
  run-code-linter:
    name: Lint TypeScript Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Node.js dependencies
        run: npm ci

      - name: Lint TypeScript code
        run: npm run tests:lint
